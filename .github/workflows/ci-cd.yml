name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_target:
        description: "Which release targets to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - vscode
          - zed

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Build VS Code package
        run: ./scripts/publish-vscode.sh --dry-run

  publish-vscode:
    name: Publish VS Code
    runs-on: ubuntu-latest
    needs:
      - validate
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      (
        github.event_name == 'workflow_dispatch' &&
        (
          github.event.inputs.release_target == 'all' ||
          github.event.inputs.release_target == 'vscode'
        )
      )
    steps:
      - name: Require VSCE_PAT
        run: |
          if [[ -z "${{ secrets.VSCE_PAT }}" ]]; then
            echo "Missing VSCE_PAT secret."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Verify release tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="v$(jq -r '.version' vscode/package.json)"
          if [[ "$GITHUB_REF_NAME" != "$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $VERSION."
            exit 1
          fi

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: ./scripts/publish-vscode.sh

  publish-zed:
    name: Publish Zed
    runs-on: ubuntu-latest
    needs:
      - validate
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      (
        github.event_name == 'workflow_dispatch' &&
        (
          github.event.inputs.release_target == 'all' ||
          github.event.inputs.release_target == 'zed'
        )
      )
    steps:
      - name: Require ZED_GH_TOKEN
        run: |
          if [[ -z "${{ secrets.ZED_GH_TOKEN }}" ]]; then
            echo "Missing ZED_GH_TOKEN secret."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Enable Corepack
        run: corepack enable

      - name: Verify release tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="v$(jq -r '.version' vscode/package.json)"
          if [[ "$GITHUB_REF_NAME" != "$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $VERSION."
            exit 1
          fi

      - name: Publish Zed registry update
        env:
          GH_TOKEN: ${{ secrets.ZED_GH_TOKEN }}
          RELEASE_THEME_FETCH_REF: ${{ github.ref }}
          RELEASE_THEME_SHA: ${{ github.sha }}
        run: ./scripts/publish-zed.sh
